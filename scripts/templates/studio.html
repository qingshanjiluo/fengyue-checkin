<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>风月AI 角色卡工作室</title>
<script>const BASE = "/";</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@400;500;600&display=swap');

:root {
  --bg: #08080f;
  --glass: rgba(255,255,255,0.04);
  --glass-border: rgba(255,255,255,0.08);
  --glass-hover: rgba(255,255,255,0.08);
  --accent: #06b6d4;
  --accent-dim: rgba(6,182,212,0.15);
  --accent2: #a78bfa;
  --text: rgba(255,255,255,0.87);
  --text-dim: rgba(255,255,255,0.45);
  --text-muted: rgba(255,255,255,0.25);
  --danger: #ef4444;
  --success: #22c55e;
  --radius: 12px;
  --radius-sm: 8px;
  --blur: 20px;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Inter','Noto Serif SC',-apple-system,sans-serif;
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  background-image:radial-gradient(ellipse at 20% 50%, rgba(6,182,212,0.06) 0%, transparent 50%),
                   radial-gradient(ellipse at 80% 20%, rgba(167,139,250,0.05) 0%, transparent 50%),
                   radial-gradient(ellipse at 50% 80%, rgba(6,182,212,0.03) 0%, transparent 50%);
}

/* ─── Nav ─── */
.nav{
  position:relative;
  padding:14px 24px;
  display:flex;
  align-items:center;
  gap:12px;
  border-bottom:1px solid var(--glass-border);
  background:rgba(8,8,15,0.8);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  z-index:10;
}
.nav::after{
  content:'';
  position:absolute;
  bottom:0;left:0;right:0;
  height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  opacity:0.3;
}
.nav h1{
  font-size:17px;
  font-weight:700;
  font-family:'Noto Serif SC',serif;
  background:linear-gradient(135deg,#06b6d4,#a78bfa);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  letter-spacing:0.5px;
}
.nav .badge{
  font-size:10px;
  padding:3px 10px;
  border-radius:20px;
  background:var(--accent-dim);
  color:var(--accent);
  border:1px solid rgba(6,182,212,0.2);
  -webkit-text-fill-color:var(--accent);
  letter-spacing:1px;
  text-transform:uppercase;
}
.nav-actions{margin-left:auto;display:flex;gap:6px}
.nav-actions button{
  padding:7px 14px;
  font-size:12px;
  border-radius:var(--radius-sm);
  border:1px solid var(--glass-border);
  background:var(--glass);
  color:var(--text-dim);
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:5px;
  transition:all .2s;
}
.nav-actions button svg{width:14px;height:14px;fill:currentColor}
.nav-actions button:hover{background:var(--glass-hover);color:var(--text);border-color:rgba(255,255,255,0.15)}
.nav-actions button.active{background:var(--accent-dim);border-color:rgba(6,182,212,0.3);color:var(--accent)}

/* ─── Container ─── */
.container{display:flex;flex:1;overflow:hidden}

/* ─── Sidebar ─── */
.sidebar{
  width:340px;
  min-width:340px;
  background:rgba(255,255,255,0.02);
  border-right:1px solid var(--glass-border);
  display:flex;
  flex-direction:column;
  backdrop-filter:blur(4px);
}
.sidebar-tabs{display:flex;border-bottom:1px solid var(--glass-border)}
.sidebar-tabs .stab{
  flex:1;
  padding:12px 8px;
  font-size:12px;
  font-weight:500;
  border:none;
  background:transparent;
  color:var(--text-muted);
  cursor:pointer;
  border-bottom:2px solid transparent;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:5px;
  transition:all .2s;
}
.sidebar-tabs .stab svg{width:14px;height:14px;fill:currentColor}
.sidebar-tabs .stab.active{color:var(--accent);border-bottom-color:var(--accent)}
.sidebar-tabs .stab:hover{color:var(--text-dim)}

/* ─── Settings Panel ─── */
.settings-panel{overflow-y:auto;padding:16px;flex:1}
.settings-panel h3{
  font-size:11px;
  font-weight:600;
  color:var(--accent);
  margin:20px 0 10px;
  text-transform:uppercase;
  letter-spacing:1px;
  display:flex;
  align-items:center;
  gap:6px;
}
.settings-panel h3 svg{width:13px;height:13px;fill:var(--accent)}
.settings-panel h3:first-child{margin-top:0}
.settings-group{display:flex;flex-direction:column;gap:10px}
.field{}
.field label{font-size:11px;color:var(--text-dim);display:block;margin-bottom:4px;font-weight:500}
.field input,.field select{
  width:100%;
  padding:9px 12px;
  background:var(--glass);
  border:1px solid var(--glass-border);
  border-radius:var(--radius-sm);
  color:var(--text);
  font-size:13px;
  outline:none;
  transition:border-color .2s;
}
.field input:focus,.field select:focus{border-color:var(--accent)}
.field input::placeholder{color:var(--text-muted)}
.field .hint{font-size:10px;color:var(--text-muted);margin-top:3px;line-height:1.4}
.btn-glass{
  padding:9px;
  border-radius:var(--radius-sm);
  border:1px solid var(--glass-border);
  background:var(--glass);
  color:var(--accent);
  font-size:12px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  transition:all .2s;
}
.btn-glass svg{width:13px;height:13px;fill:currentColor}
.btn-glass:hover{background:var(--glass-hover);border-color:rgba(6,182,212,0.3);color:var(--accent)}
.btn-primary{
  width:100%;
  padding:10px;
  margin-top:16px;
  border-radius:var(--radius-sm);
  border:none;
  background:linear-gradient(135deg,rgba(6,182,212,0.8),rgba(167,139,250,0.6));
  color:#fff;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  transition:all .2s;
}
.btn-primary svg{width:14px;height:14px;fill:currentColor}
.btn-primary:hover{opacity:0.9;transform:translateY(-1px)}
.model-check{
  display:flex;
  align-items:center;
  gap:8px;
  padding:5px 8px;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
  transition:background .15s;
}
.model-check:hover{background:var(--glass)}
.model-check input{accent-color:var(--accent)}

/* ─── Hotlist Panel ─── */
.hotlist-panel{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.hotlist-header{
  display:flex;
  gap:8px;
  padding:12px;
  border-bottom:1px solid var(--glass-border);
  align-items:center;
}
.hotlist-header select{
  flex:1;
  padding:7px 10px;
  background:var(--glass);
  border:1px solid var(--glass-border);
  border-radius:var(--radius-sm);
  color:var(--text);
  font-size:12px;
  outline:none;
}
.hotlist-header select:focus{border-color:var(--accent)}
.hl-items{flex:1;overflow-y:auto;padding:8px}
.hl-loading{text-align:center;padding:40px 0;color:var(--text-muted);font-size:13px}
.hl-card{
  background:var(--glass);
  border:1px solid var(--glass-border);
  border-radius:var(--radius);
  padding:12px;
  margin-bottom:8px;
  cursor:pointer;
  transition:all .2s;
  backdrop-filter:blur(8px);
}
.hl-card:hover{border-color:rgba(6,182,212,0.25);background:var(--glass-hover);transform:translateY(-1px)}
.hl-card .hl-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hl-card .hl-meta{font-size:11px;color:var(--text-dim);display:flex;gap:12px;flex-wrap:wrap}
.hl-card .hl-meta span{background:rgba(255,255,255,0.04);padding:2px 8px;border-radius:4px;display:flex;align-items:center;gap:3px}
.hl-card .hl-meta span svg{width:11px;height:11px;fill:currentColor}
.hl-card .hl-tags{font-size:10px;color:var(--text-muted);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:3px}
.hl-card .hl-tags svg{width:10px;height:10px;fill:currentColor}
.hl-card .hl-desc{font-size:11px;color:var(--text-muted);margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4}
.hl-card .hl-actions{display:flex;gap:6px;margin-top:8px}
.hl-card .hl-actions button{
  flex:1;
  padding:5px 8px;
  font-size:11px;
  border-radius:6px;
  border:none;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:4px;
  transition:all .15s;
}
.hl-card .hl-actions button svg{width:12px;height:12px;fill:currentColor}
.hl-use{background:var(--accent);color:#fff}
.hl-use:hover{opacity:0.9}
.hl-use.alt{background:rgba(6,182,212,0.15);color:var(--accent)}
.hl-preview{background:var(--glass);color:var(--text-dim);border:1px solid var(--glass-border)!important}
.hl-preview:hover{background:var(--glass-hover);color:var(--text)}

/* ─── Image Lib ─── */
.imglib-upload{text-align:center;padding:12px;position:relative}
.imglib-upload input[type="file"]{display:none}
.imglib-upload .upload-actions{display:flex;gap:8px;justify-content:center}
.imglib-upload .upload-actions label{
  padding:8px 16px;
  background:var(--glass);
  border:1px dashed var(--glass-border);
  border-radius:var(--radius-sm);
  font-size:12px;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:5px;
  transition:all .2s;
  flex:1;
  justify-content:center;
}
.imglib-upload .upload-actions label svg{width:14px;height:14px;fill:currentColor}
.imglib-upload .upload-actions label:hover{background:var(--glass-hover);border-color:var(--accent)}
.drop-hint{
  font-size:10px;
  color:var(--text-muted);
  margin-top:6px;
  padding:10px;
  border:1px dashed var(--glass-border);
  border-radius:var(--radius-sm);
  text-align:center;
  transition:all .3s;
}
#panel-images.dragover .drop-hint{border-color:var(--accent);background:var(--accent-dim);color:var(--accent)}
.imglib-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px}
.imglib-item{
  background:var(--glass);
  border:1px solid var(--glass-border);
  border-radius:var(--radius-sm);
  overflow:hidden;
  cursor:pointer;
  position:relative;
  transition:all .2s;
  backdrop-filter:blur(4px);
}
.imglib-item:hover{border-color:rgba(6,182,212,0.3);transform:translateY(-1px)}
.imglib-item img{width:100%;height:85px;object-fit:cover;display:block}
.imglib-item .name{
  display:flex;
  align-items:center;
  gap:4px;
  font-size:10px;
  padding:4px 6px;
  color:var(--text-dim);
  overflow:hidden;
}
.imglib-item .name span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.imglib-item .name input{
  width:100%;
  font-size:10px;
  padding:2px 5px;
  background:rgba(0,0,0,0.4);
  border:1px solid var(--accent);
  border-radius:4px;
  color:var(--text);
  outline:none;
}
.imglib-item .actions{
  position:absolute;
  top:3px;
  right:3px;
  display:none;
  gap:2px;
}
.imglib-item:hover .actions{display:flex}
.imglib-item .actions button{
  padding:3px 5px;
  font-size:9px;
  border:none;
  border-radius:4px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all .15s;
  backdrop-filter:blur(4px);
}
.imglib-item .actions button svg{width:11px;height:11px;fill:currentColor}
.imglib-item .actions .use{background:rgba(6,182,212,0.7);color:#fff}
.imglib-item .actions .use:hover{background:var(--accent)}
.imglib-item .actions .del{background:rgba(239,68,68,0.7);color:#fff}
.imglib-item .actions .del:hover{background:var(--danger)}
.rename-btn{
  font-size:9px;
  padding:0 3px;
  border:none;
  background:none;
  color:var(--text-muted);
  cursor:pointer;
  opacity:0;
  transition:opacity .15s;
  display:flex;
  align-items:center;
}
.rename-btn svg{width:10px;height:10px;fill:currentColor}
.imglib-item:hover .rename-btn{opacity:1}
.rename-btn:hover{color:var(--accent)}

/* ─── Chat Area ─── */
.chat-area{flex:1;display:flex;flex-direction:column;background:transparent;position:relative}
.chat-area::before{
  content:'';
  position:absolute;
  inset:0;
  background:radial-gradient(ellipse at 60% 30%, rgba(6,182,212,0.03) 0%, transparent 60%);
  pointer-events:none;
}
.msgs{
  flex:1;
  overflow-y:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
  position:relative;
  z-index:1;
}
.msg{
  max-width:78%;
  padding:12px 16px;
  border-radius:var(--radius);
  font-size:14px;
  line-height:1.65;
  animation:fadeIn .3s;
  backdrop-filter:blur(8px);
}
.msg.user{
  background:rgba(6,182,212,0.12);
  border:1px solid rgba(6,182,212,0.15);
  align-self:flex-end;
  border-bottom-right-radius:4px;
}
.msg.assistant{
  background:var(--glass);
  border:1px solid var(--glass-border);
  align-self:flex-start;
  border-bottom-left-radius:4px;
}
.msg.system{
  background:rgba(239,68,68,0.08);
  border:1px solid rgba(239,68,68,0.15);
  align-self:center;
  font-size:12px;
  color:var(--danger);
}
.msg .time{font-size:10px;color:var(--text-muted);margin-top:6px}
.input-area{
  border-top:1px solid var(--glass-border);
  padding:12px 20px;
  display:flex;
  gap:10px;
  align-items:flex-end;
  position:relative;
  z-index:1;
  background:rgba(8,8,15,0.6);
  backdrop-filter:blur(12px);
}
.input-area textarea{
  flex:1;
  background:var(--glass);
  border:1px solid var(--glass-border);
  border-radius:var(--radius);
  padding:10px 14px;
  color:var(--text);
  font-size:14px;
  font-family:inherit;
  resize:none;
  min-height:44px;
  max-height:120px;
  outline:none;
  transition:border-color .2s;
}
.input-area textarea:focus{border-color:var(--accent)}
.input-area textarea::placeholder{color:var(--text-muted)}
.input-area .send-btn{
  width:44px;
  height:44px;
  min-width:44px;
  border-radius:var(--radius);
  border:none;
  background:linear-gradient(135deg,var(--accent),rgba(167,139,250,0.7));
  color:#fff;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all .2s;
}
.input-area .send-btn svg{width:17px;height:17px;fill:currentColor}
.input-area .send-btn:disabled{opacity:0.3;cursor:not-allowed}
.input-area .send-btn:hover:not(:disabled){opacity:0.9;transform:translateY(-1px)}

/* ─── Status Bar ─── */
.status-bar{
  height:30px;
  background:rgba(8,8,15,0.8);
  border-top:1px solid var(--glass-border);
  display:flex;
  align-items:center;
  padding:0 16px;
  font-size:11px;
  color:var(--text-muted);
  gap:8px;
  backdrop-filter:blur(12px);
}
.status-bar .dot{width:6px;height:6px;border-radius:50%;background:var(--success)}
.status-bar .dot.busy{background:#eab308;animation:pulse 1s infinite}

/* ─── Animations ─── */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.typing{display:flex;gap:5px;padding:6px 0}
.typing span{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:bounce 1.4s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}

/* ─── Progress ─── */
.progress{
  background:var(--glass);
  border:1px solid var(--glass-border);
  border-radius:var(--radius);
  padding:10px 14px;
  font-size:12px;
  color:var(--text-dim);
  margin-top:4px;
  backdrop-filter:blur(8px);
}
.progress .step{display:flex;align-items:center;gap:8px;padding:3px 0}
.progress .step.done{color:var(--success)}
.progress .step.active{color:#eab308}
.progress .step.error{color:var(--danger)}
.step-icon{width:16px;text-align:center;display:flex;align-items:center;justify-content:center}
.step-icon svg{width:12px;height:12px;fill:currentColor}

/* ─── Modal ─── */
.modal-overlay{
  display:none;
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(12px);
  z-index:1000;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
.modal-overlay img{
  max-width:90vw;
  max-height:90vh;
  border-radius:var(--radius);
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
  border:1px solid var(--glass-border);
}

/* ─── Toast ─── */
.toast{
  position:fixed;
  bottom:56px;
  left:50%;
  transform:translateX(-50%);
  background:var(--glass);
  border:1px solid var(--glass-border);
  backdrop-filter:blur(20px);
  padding:8px 20px;
  border-radius:var(--radius);
  font-size:12px;
  z-index:999;
  animation:fadeIn .3s;
  display:flex;
  align-items:center;
  gap:6px;
}
.toast svg{width:14px;height:14px;fill:currentColor}

/* ─── Responsive ─── */
@media(max-width:768px){
  .sidebar{width:100%;min-width:100%;display:none}
  .sidebar.open{display:flex;position:fixed;top:0;left:0;bottom:0;z-index:100}
  .container{flex-direction:column}
  .msg{max-width:90%}
}
</style>
</head>

<script>
// ── SVG helper ──
const S = (name) => '<svg><use href="#icon-' + name + '"/></svg>';

let settings = {};
let taskId = null;
let eventSource = null;

async function loadSettings() {
  try {
    const r = await fetch(BASE + 'api/settings');
    settings = await r.json();
    document.getElementById('s-api-url').value = settings.api_url || '';
    document.getElementById('s-api-key').value = settings.api_key || '';
    document.getElementById('s-model').value = settings.model || '';
    document.getElementById('s-email').value = settings.email || '';
    document.getElementById('s-password').value = settings.password || '';
    document.getElementById('s-anonymous').checked = settings.anonymous || false;
    document.getElementById('s-persona').value = settings.ai_persona || '';
    const selectedModels = (settings.model || '').split(',').map(s => s.trim()).filter(Boolean);
    if (selectedModels.length > 0) {
      window._pendingModelSelection = selectedModels;
    }
  } catch(e) { console.log('no saved settings'); }
}

async function fetchModels() {
  const apiUrl = document.getElementById('s-api-url').value.trim();
  const apiKey = document.getElementById('s-api-key').value.trim();
  if (!apiUrl || !apiKey) {
    showToast(S('warn') + ' 请先填写接口地址和 API Key');
    return;
  }
  const container = document.getElementById('modelCheckboxes');
  container.innerHTML = '<div style="color:var(--text-muted);font-size:12px;padding:8px">正在获取模型列表...</div>';
  try {
    const r = await fetch(BASE + 'api/models?api_url=' + encodeURIComponent(apiUrl) + '&api_key=' + encodeURIComponent(apiKey));
    const data = await r.json();
    if (!data.ok) {
      container.innerHTML = '<div style="color:var(--danger);font-size:12px;padding:8px">' + S('warn') + ' ' + (data.error || '获取失败') + '</div>';
      return;
    }
    const saved = (document.getElementById('s-model').value || '').split(',').map(s => s.trim()).filter(Boolean);
    const selected = new Set(saved);
    container.innerHTML = data.models.map(m => {
      const checked = selected.has(m) ? 'checked' : '';
      return '<label class="model-check"><input type="checkbox" value="' + m.replace(/"/g,'&quot;') + '" ' + checked + ' onchange="syncModelInput()"> ' + m + '</label>';
    }).join('');
    if (data.models.length === 0) {
      container.innerHTML = '<div style="color:var(--text-muted);font-size:12px;padding:8px">没有找到可用模型</div>';
    }
    showToast(S('check') + ' 获取到 ' + data.models.length + ' 个模型');
  } catch(e) {
    container.innerHTML = '<div style="color:var(--danger);font-size:12px;padding:8px">' + S('warn') + ' 请求失败: ' + e.message + '</div>';
  }
}

function syncModelInput() {
  const checks = document.querySelectorAll('#modelCheckboxes input[type="checkbox"]:checked');
  const models = Array.from(checks).map(c => c.value);
  document.getElementById('s-model').value = models.join(', ');
}

async function saveSettings() {
  syncModelInput();
  const s = {
    api_url: document.getElementById('s-api-url').value,
    api_key: document.getElementById('s-api-key').value,
    model: document.getElementById('s-model').value,
    email: document.getElementById('s-email').value,
    password: document.getElementById('s-password').value,
    anonymous: document.getElementById('s-anonymous').checked,
    ai_persona: document.getElementById('s-persona').value,
  };
  await fetch(BASE + 'api/settings', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(s),
  });
  settings = s;
  showToast(S('check') + ' 设置已保存');
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

function clearChat() {
  const area = document.getElementById('msgArea');
  area.innerHTML = '<div class="msg assistant">对话已清空。请描述你想要创建的角色卡。<div class="time">刚刚</div></div>';
}

function addMsg(role, text, extra) {
  const area = document.getElementById('msgArea');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = text + '<div class="time">' + (extra || new Date().toLocaleTimeString()) + '</div>';
  if (role === 'assistant' && extra === 'progress') div.id = 'progressMsg';
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

function showProgress(steps, current) {
  let html = '<div class="progress">';
  for (let i = 0; i < steps.length; i++) {
    const cls = i < current ? 'done' : i === current ? 'active' : '';
    const icon = i < current ? 'check' : i === current ? 'dot' : 'prev';
    html += '<div class="step ' + cls + '"><span class="step-icon">' + S(icon) + '</span> ' + steps[i] + '</div>';
  }
  html += '</div>';
  let el = document.getElementById('progressMsg');
  if (!el) {
    el = addMsg('assistant', html, '');
    el.id = 'progressMsg';
  } else {
    el.innerHTML = html;
  }
  document.getElementById('msgArea').scrollTop = document.getElementById('msgArea').scrollHeight;
}

function removeProgress() {
  const el = document.getElementById('progressMsg');
  if (el) el.remove();
}

let currentPanel = 'settings';

function switchPanel(name) {
  currentPanel = name;
  document.querySelectorAll('.stab').forEach(b => b.classList.toggle('active', b.dataset.panel === name));
  document.getElementById('panel-settings').style.display = name === 'settings' ? '' : 'none';
  document.getElementById('panel-images').style.display = name === 'images' ? '' : 'none';
  document.getElementById('panel-hotlist').style.display = name === 'hotlist' ? '' : 'none';
  if (name === 'hotlist') loadHotlist();
  if (name === 'images') loadImages();
}

function toggleHotlist() {
  const btn = document.getElementById('btnHotlist');
  if (currentPanel === 'hotlist') {
    switchPanel('settings');
    btn.classList.remove('active');
  } else {
    switchPanel('hotlist');
    btn.classList.add('active');
  }
}

async function loadHotlist() {
  const ranking = document.getElementById('hl-ranking').value;
  const container = document.getElementById('hlItems');
  container.innerHTML = '<div class="hl-loading">' + S('refresh') + ' 加载热榜...</div>';
  try {
    const r = await fetch(BASE + 'api/hotlist?ranking=' + ranking + '&refresh=1');
    const data = await r.json();
    if (!data.ok || !data.items) {
      container.innerHTML = '<div class="hl-loading">' + S('warn') + ' ' + (data.error || '加载失败') + '</div>';
      return;
    }
    renderHotlist(data.items);
  } catch(e) {
    container.innerHTML = '<div class="hl-loading">' + S('warn') + ' 请求失败: ' + e.message + '</div>';
  }
}

function renderHotlist(items) {
  const container = document.getElementById('hlItems');
  if (!items || items.length === 0) {
    container.innerHTML = '<div class="hl-loading">暂无数据</div>';
    return;
  }
  container.innerHTML = items.map((item, i) =>
    '<div class="hl-card">' +
      '<div class="hl-title">' + (i+1) + '. ' + escHtml(item.title) + '</div>' +
      '<div class="hl-meta">' +
        '<span>' + S('fire') + ' ' + item.playCount + '</span>' +
        '<span>' + S('star') + ' ' + item.rating + '</span>' +
        (item.author ? '<span>' + S('person') + ' ' + escHtml(item.author) + '</span>' : '') +
      '</div>' +
      (item.tags ? '<div class="hl-tags">' + S('tag') + ' ' + escHtml(item.tags) + '</div>' : '') +
      (item.description ? '<div class="hl-desc">' + escHtml(item.description.slice(0, 150)) + '</div>' : '') +
      '<div class="hl-actions">' +
        '<button class="hl-use alt" onclick="useHotlistItem(' + i + ')">' + S('edit') + ' 参考创作</button>' +
        '<button class="hl-use" onclick="quickCreate(' + i + ')">' + S('lightning') + ' 一键创作</button>' +
        '<button class="hl-preview" onclick="window.open(\'' + item.url + '\',\'_blank\')">' + S('link') + ' 预览</button>' +
      '</div>' +
    '</div>'
  ).join('');
  window._hlItems = items;
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function quickCreate(index) {
  const items = window._hlItems || [];
  const item = items[index];
  if (!item) return;
  const prompt = `请参考这个热门作品，创作一个风格类似的全新角色卡：

参考作品: ${item.title}
热度: ${item.playCount}
标签: ${item.tags}
简介: ${item.description}

要求：
1. 创作一个全新的原创角色卡，不要复制原作品
2. 保持类似的风格、题材和用户群体
3. 角色设定要完整（姓名、职业、年龄、性别、外貌、性格、语气、背景）
4. 作品名要有吸引力`;
  document.getElementById('chatInput').value = prompt;
  switchPanel('settings');
  document.getElementById('btnHotlist').classList.remove('active');
  setTimeout(() => sendMsg(), 500);
}

function useHotlistItem(index) {
  const items = window._hlItems || [];
  const item = items[index];
  if (!item) return;
  const prompt = `请参考这个热门作品的风格和设定，帮我创作一个类似的角色卡：

参考作品: ${item.title}
热度: ${item.playCount}
标签: ${item.tags}
简介: ${item.description}

请创作一个类似风格的全新角色卡，包括完整的角色设定。`;
  document.getElementById('chatInput').value = prompt;
  document.getElementById('chatInput').focus();
  switchPanel('settings');
  document.getElementById('btnHotlist').classList.remove('active');
  showToast('已填入参考 prompt，点击发送即可');
}

function showToast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

function setStatus(text, busy) {
  document.getElementById('statusText').textContent = text;
  document.getElementById('statusDot').className = 'dot' + (busy ? ' busy' : '');
}

async function sendMsg() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  if (!settings.api_key || !settings.email) {
    addMsg('system', S('warn') + ' 请先在右侧设置面板中配置 OpenAI API Key 和风月账号信息');
    return;
  }
  input.value = '';
  document.getElementById('sendBtn').disabled = true;
  setStatus('AI 思考中...', true);
  addMsg('user', text.replace(/\n/g, '<br>'));
  try {
    const r = await fetch(BASE + 'api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ message: text }),
    });
    const data = await r.json();
    if (data.error) {
      addMsg('system', S('warn') + ' ' + data.error);
      setStatus('就绪', false);
      document.getElementById('sendBtn').disabled = false;
      return;
    }
    if (data.needs_info && data.questions && data.questions.length > 0) {
      let qHtml = data.plan ? '<p>' + data.plan.replace(/\n/g, '<br>') + '</p>' : '';
      qHtml += '<p style="margin-top:8px;color:#eab308;font-weight:600">AI 需要确认以下信息：</p><ul style="margin:6px 0 0 16px;color:var(--text-dim)">';
      data.questions.forEach(q => { qHtml += '<li style="margin:4px 0">' + escHtml(q) + '</li>'; });
      qHtml += '</ul><p style="margin-top:8px;font-size:12px;color:var(--text-muted)">请在输入框中补充回答上述问题</p>';
      addMsg('assistant', qHtml);
      setStatus('等待补充信息', false);
      document.getElementById('sendBtn').disabled = false;
      return;
    }
    addMsg('assistant', data.plan.replace(/\n/g, '<br>'));
    if (data.task_id) {
      taskId = data.task_id;
      const steps = data.steps || ['AI 分析需求', '登录风月平台', '填写基础信息', '添加主角', '添加额外角色', '添加CG图片', '发布角色卡'];
      showProgress(steps, -1);
      pollProgress(taskId, steps);
    } else {
      setStatus('就绪', false);
      document.getElementById('sendBtn').disabled = false;
    }
  } catch(e) {
    addMsg('system', S('warn') + ' 请求失败: ' + e.message);
    setStatus('就绪', false);
    document.getElementById('sendBtn').disabled = false;
  }
}

async function pollProgress(tid, steps) {
  try {
    const r = await fetch(BASE + 'api/task/' + tid);
    const data = await r.json();
    showProgress(steps, data.current_step);
    setStatus(data.status_text || '执行中...', true);
    if (data.log) {
      let existing = document.getElementById('logMsg');
      if (!existing) {
        existing = addMsg('system', '<pre style="margin:0;font-size:11px;color:var(--text-dim);white-space:pre-wrap">' + (data.log || '') + '</pre>');
        existing.id = 'logMsg';
      } else {
        existing.querySelector('pre').textContent = data.log || '';
      }
    }
    if (data.done) {
      setStatus('完成', false);
      document.getElementById('sendBtn').disabled = false;
      removeProgress();
      if (data.result) {
        addMsg('assistant', S('check') + ' 角色卡已成功创建！<br>' + (data.result.url ? S('link') + ' <a href="' + data.result.url + '" target="_blank" style="color:var(--accent)">查看角色卡</a>' : ''));
      }
      return;
    }
    if (data.error) {
      setStatus('错误', false);
      document.getElementById('sendBtn').disabled = false;
      removeProgress();
      addMsg('system', S('warn') + ' ' + data.error);
      return;
    }
    setTimeout(() => pollProgress(tid, steps), 1000);
  } catch(e) {
    setTimeout(() => pollProgress(tid, steps), 2000);
  }
}

loadSettings();
</script>

<script>
// ── 图片库 ─────────────────────────────────────────────────

async function loadImages() {
  const grid = document.getElementById('imgGrid');
  grid.innerHTML = '<div style="text-align:center;padding:40px 0;color:var(--text-muted);font-size:13px;grid-column:1/-1">' + S('refresh') + ' 加载中...</div>';
  try {
    const r = await fetch(BASE + 'api/images');
    const data = await r.json();
    if (!data.ok || !data.images) {
      grid.innerHTML = '<div style="text-align:center;padding:40px 0;color:var(--danger);font-size:13px;grid-column:1/-1">' + S('warn') + ' 加载失败</div>';
      return;
    }
    window._imgData = data.images;
    if (data.images.length === 0) {
      grid.innerHTML = '<div style="text-align:center;padding:40px 0;color:var(--text-muted);font-size:13px;grid-column:1/-1">暂无图片，拖拽图片到此处或点击上传</div>';
      return;
    }
    grid.innerHTML = data.images.map(img => {
      const dims = (img.width && img.height) ? img.width + '×' + img.height : '';
      const sizeStr = img.size ? (img.size / 1024).toFixed(0) + 'KB' : '';
      const sn = escHtml(img.name);
      const sq = img.name.replace(/'/g,"\\'");
      return '<div class="imglib-item" data-name="' + sn + '">' +
        '<img src="' + img.thumb + '?t=' + Date.now() + '" loading="lazy" onclick="previewImg(\'' + img.url + '\')" style="cursor:pointer">' +
        '<div class="name" id="name-' + sn + '">' +
          '<span id="ntext-' + sn + '" ondblclick="startRename(\'' + sq + '\')" title="双击重命名">' + sn + '</span>' +
          (dims ? ' <span style="color:var(--text-muted);font-size:9px">' + dims + '</span>' : '') +
          (sizeStr ? ' <span style="color:var(--text-muted);font-size:9px">' + sizeStr + '</span>' : '') +
          '<button class="rename-btn" onclick="event.stopPropagation();startRename(\'' + sq + '\')" title="重命名">' + S('edit') + '</button>' +
        '</div>' +
        '<div class="actions">' +
          '<button class="use" onclick="event.stopPropagation();tagOneImage(\'' + sq + '\')" title="识图标注">' + S('tag') + '</button>' +
          '<button class="use" onclick="event.stopPropagation();addImgToChat(\'' + sq + '\')" title="添加到对话">' + S('robot') + '</button>' +
          '<button class="del" onclick="event.stopPropagation();deleteImage(\'' + sq + '\')" title="删除">' + S('delete') + '</button>' +
        '</div>' +
      '</div>';
    }).join('');
  } catch(e) {
    grid.innerHTML = '<div style="text-align:center;padding:40px 0;color:var(--danger);font-size:13px;grid-column:1/-1">' + S('warn') + ' 请求失败: ' + e.message + '</div>';
  }
}

function previewImg(url) {
  const modal = document.getElementById('imgPreviewModal');
  const img = document.getElementById('imgPreviewContent');
  img.src = url + '?t=' + Date.now();
  modal.style.display = 'flex';
}

function addImgToChat(name) {
  const imgs = window._imgData || [];
  const img = imgs.find(i => i.name === name);
  const info = img ? '(' + (img.width||'?') + '×' + (img.height||'?') + ')' : '';
  const prompt = '我在图片库中有一张图片可用: ' + name + ' ' + info + '。请根据角色风格选择是否使用这张图片作为封面或背景。';
  const input = document.getElementById('chatInput');
  input.value = prompt;
  input.focus();
  switchPanel('settings');
  showToast(S('check') + ' 已填入图片信息到对话');
}

// ── 重命名 ──
let _renaming = false;
function startRename(name) {
  if (_renaming) return;
  const span = document.getElementById('ntext-' + name);
  if (!span) return;
  const container = span.parentElement;
  const oldName = name;
  const ext = oldName.includes('.') ? oldName.slice(oldName.lastIndexOf('.')) : '';
  const base = ext ? oldName.slice(0, oldName.lastIndexOf('.')) : oldName;
  const input = document.createElement('input');
  input.value = base;
  input.setAttribute('data-ext', ext);
  span.style.display = 'none';
  container.insertBefore(input, span);
  _renaming = true;
  input.focus();
  input.select();
  async function commit() {
    let newBase = input.value.trim();
    if (!newBase) { cancel(); return; }
    const ext2 = input.getAttribute('data-ext') || '';
    const newName = newBase + ext2;
    if (newName === oldName) { cancel(); return; }
    try {
      const r = await fetch(BASE + 'api/images/rename', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({old_name: oldName, new_name: newName}),
      });
      const data = await r.json();
      if (data.ok) {
        showToast(S('check') + ' 已重命名为: ' + newName);
        loadImages();
      } else {
        showToast(S('warn') + ' ' + (data.error || '重命名失败'));
        cancel();
      }
    } catch(e) {
      showToast(S('warn') + ' 重命名失败: ' + e.message);
      cancel();
    }
  }
  function cancel() {
    _renaming = false;
    if (input.parentElement) input.remove();
    span.style.display = '';
  }
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); commit(); }
    if (e.key === 'Escape') { e.preventDefault(); cancel(); }
  });
  input.addEventListener('blur', () => commit());
}

// ── 识图标注 ──
async function tagOneImage(name) {
  const btn = event?.target?.closest?.('button');
  if (btn) { btn.disabled = true; btn.style.opacity = '0.5'; }
  showToast(S('tag') + ' 正在识别: ' + name);
  try {
    const r = await fetch(BASE + 'api/images/tag', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name: name}),
    });
    const data = await r.json();
    if (data.ok && data.results && data.results[0]?.ok) {
      showToast(S('check') + ' 标注完成: ' + data.results[0].tags);
      loadImages();
    } else {
      showToast(S('warn') + ' ' + ((data.results?.[0]?.error) || data.error || '识别失败'));
    }
  } catch(e) {
    showToast(S('warn') + ' 请求失败: ' + e.message);
  }
  if (btn) { btn.disabled = false; btn.style.opacity = ''; }
}

async function tagAllImages() {
  showToast(S('tag') + ' 正在批量识图标注...');
  try {
    const r = await fetch(BASE + 'api/images/tag', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: '{}',
    });
    const data = await r.json();
    if (data.ok) {
      const total = data.results?.length || 0;
      const ok = data.results?.filter(r => r.ok).length || 0;
      showToast(S('check') + ' 标注完成: ' + ok + '/' + total + ' 成功');
      loadImages();
    } else {
      showToast(S('warn') + ' ' + (data.error || '操作失败'));
    }
  } catch(e) {
    showToast(S('warn') + ' 请求失败: ' + e.message);
  }
}

// ── 删除 ──
async function deleteImage(name) {
  if (!confirm('确定要删除「' + name + '」吗？')) return;
  try {
    const r = await fetch(BASE + 'api/images/' + encodeURIComponent(name), { method: 'DELETE' });
    const data = await r.json();
    if (data.ok) {
      showToast(S('check') + ' 已删除: ' + name);
      loadImages();
    } else {
      showToast(S('warn') + ' ' + (data.error || '删除失败'));
    }
  } catch(e) {
    showToast(S('warn') + ' 删除失败: ' + e.message);
  }
}

// ── 打开本地文件夹 ──
async function openImageFolder() {
  try {
    const r = await fetch(BASE + 'api/images/open-folder', { method: 'POST' });
    const data = await r.json();
    if (data.ok) {
      showToast(S('folder') + ' 已打开文件夹');
    } else {
      showToast(S('warn') + ' ' + (data.error || '操作失败'));
    }
  } catch(e) {
    showToast(S('warn') + ' 请求失败: ' + e.message);
  }
}

// ── 拖拽上传 ──
(function setupDragDrop() {
  const panel = document.getElementById('panel-images');
  if (!panel) return;
  let cnt = 0;
  panel.addEventListener('dragenter', (e) => { e.preventDefault(); e.stopPropagation(); cnt++; panel.classList.add('dragover'); });
  panel.addEventListener('dragleave', (e) => { e.preventDefault(); e.stopPropagation(); cnt--; if (cnt===0) panel.classList.remove('dragover'); });
  panel.addEventListener('dragover', (e) => { e.preventDefault(); e.stopPropagation(); });
  panel.addEventListener('drop', async (e) => {
    e.preventDefault(); e.stopPropagation();
    panel.classList.remove('dragover'); cnt = 0;
    const files = e.dataTransfer.files;
    if (files.length) await uploadImages(files);
  });
})();

// ── 上传 ──
async function uploadImages(files) {
  const valid = [], exts = ['.png', '.jpg', '.jpeg', '.gif', '.webp', '.bmp'];
  for (const f of files) {
    const ext = '.' + f.name.split('.').pop().toLowerCase();
    if (exts.includes(ext)) valid.push(f);
  }
  if (!valid.length) { showToast(S('warn') + ' 没有可用的图片文件'); return; }
  showToast(S('upload') + ' 上传 ' + valid.length + ' 张...');
  let ok = 0, fail = 0;
  for (const f of valid) {
    const fd = new FormData();
    fd.append('file', f);
    try {
      const r = await fetch(BASE + 'api/images/upload', { method: 'POST', body: fd });
      const data = await r.json();
      if (data.ok) ok++; else fail++;
    } catch(e) { fail++; }
  }
  showToast(S('check') + ' 上传完成: ' + ok + ' 成功' + (fail ? ', ' + fail + ' 失败' : ''));
  loadImages();
}
</script>
